services:
  app:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"

volumes:
  node_modules:
  next_cache:
